name: OI Colaboradores — Coleta Mensal

on:
  schedule:
    # 08:00 BRT = 11:00 UTC — Segunda a Domingo
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      mes:
        description: 'Mês (1-12). Vazio = mês atual.'
        required: false
      ano:
        description: 'Ano (ex: 2026). Vazio = ano atual.'
        required: false

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências do sistema (Puppeteer)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2

      - name: Instalar dependências
        run: npm ci

      - name: Criar .env
        run: |
          echo "OI_EMAIL=${{ secrets.OI_EMAIL }}"                                                 >> .env
          echo "OI_SENHA=${{ secrets.OI_SENHA }}"                                                 >> .env
          echo "NEXUSZ_SUPABASE_URL=${{ secrets.NEXUSZ_SUPABASE_URL }}"                           >> .env
          echo "NEXUSZ_SUPABASE_SERVICE_ROLE_KEY=${{ secrets.NEXUSZ_SUPABASE_SERVICE_ROLE_KEY }}" >> .env
          echo "NEXUSZ_SUPABASE_ANON_KEY=${{ secrets.NEXUSZ_SUPABASE_ANON_KEY }}"                 >> .env
          echo "WHATSAPP_GRUPO_AUTOMACAO_ID=${{ secrets.WHATSAPP_GRUPO_AUTOMACAO_ID }}"           >> .env

      - name: Coletar mês atual (BRT)
        run: |
          MES=$(node -e "process.stdout.write(String(new Date(new Intl.DateTimeFormat('sv',{timeZone:'America/Sao_Paulo'}).format(new Date())).getMonth()+1))")
          ANO=$(node -e "process.stdout.write(String(new Date(new Intl.DateTimeFormat('sv',{timeZone:'America/Sao_Paulo'}).format(new Date())).getFullYear()))")

          # Override via workflow_dispatch
          if [ -n "${{ github.event.inputs.mes }}" ]; then MES="${{ github.event.inputs.mes }}"; fi
          if [ -n "${{ github.event.inputs.ano }}" ]; then ANO="${{ github.event.inputs.ano }}"; fi

          echo "📅 Coletando OI Colaboradores: mês $MES / $ANO"
          node tools/scraper-oi-colaboradores.js --mes "$MES" --ano "$ANO"

      - name: Retroativo da semana (todo Domingo)
        run: |
          DIA_SEMANA=$(node -e "process.stdout.write(String(new Date(new Intl.DateTimeFormat('sv',{timeZone:'America/Sao_Paulo'}).format(new Date())).getDay()))")
          if [ "$DIA_SEMANA" = "0" ]; then
            DATAS=$(node -e "
              const hoje = new Date(new Intl.DateTimeFormat('sv',{timeZone:'America/Sao_Paulo'}).format(new Date()));
              const seg  = new Date(hoje); seg.setDate(hoje.getDate() - 6);
              const sab  = new Date(hoje); sab.setDate(hoje.getDate() - 1);
              const fmt  = d => d.getDate().toString().padStart(2,'0') + '/' + (d.getMonth()+1).toString().padStart(2,'0') + '/' + d.getFullYear();
              process.stdout.write(fmt(seg) + ' ' + fmt(sab));
            ")
            DATA_INICIO=$(echo $DATAS | cut -d' ' -f1)
            DATA_FIM=$(echo    $DATAS | cut -d' ' -f2)
            echo "🔄 Domingo — retroativo da semana: $DATA_INICIO → $DATA_FIM"
            node tools/scraper-oi-colaboradores.js --data-inicio "$DATA_INICIO" --data-fim "$DATA_FIM"
          else
            echo "⏭️  Dia $DIA_SEMANA — retroativo semanal pulado."
          fi

      - name: Salvar screenshots de debug como artefato
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-colab-${{ github.run_number }}
          path: output/debug-oi/
          if-no-files-found: ignore
          retention-days: 3
