name: Coletar Vendas Pneus — Retroativo

on:
  workflow_dispatch:
    inputs:
      data_inicio:
        description: 'Data início (YYYY-MM-DD)'
        required: true
        default: '2026-05-09'
      data_fim:
        description: 'Data fim (YYYY-MM-DD)'
        required: true
        default: '2026-05-29'
      delay_segundos:
        description: 'Delay entre dias (segundos, mínimo 5)'
        required: false
        default: '8'

jobs:
  retroativo:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Preparar ambiente ───────────────────────────────────────────────────
      - name: Criar shim dotenv e .env com credenciais
        run: |
          mkdir -p node_modules/dotenv
          printf 'exports.config = function() {};\n' > node_modules/dotenv/index.js
          printf 'exports.config = function() {};\n' > node_modules/dotenv/config.js

          # Credenciais Supabase NexusZ
          printf 'NEXUSZ_SUPABASE_URL=%s\n'                     "$NEXUSZ_URL"   > .env
          printf 'NEXUSZ_SUPABASE_SERVICE_ROLE_KEY=%s\n'        "$NEXUSZ_KEY"  >> .env

          # Tokens OI — mapeados dos secrets existentes no repo
          printf 'OI_TOKEN_ALT_BR01_CENTRO=%s\n'                "$OI_BR01"     >> .env
          printf 'OI_TOKEN_BR02_VILA=%s\n'                      "$OI_BR02"     >> .env
          printf 'OI_TOKEN_ALT_BR03_AMERICANA=%s\n'             "$OI_BR03"     >> .env
          printf 'OI_TOKEN_BR04_SAO_CARLOS=%s\n'                "$OI_BR04"     >> .env
          printf 'OI_TOKEN_BR05_MARINGA=%s\n'                   "$OI_BR05"     >> .env
          printf 'OI_TOKEN_PEG1_ARARAQUARA=%s\n'                "$OI_PEG01"    >> .env
          printf 'OI_TOKEN_PEG2_SOROCABA=%s\n'                  "$OI_PEG02"    >> .env

          echo "Ambiente preparado."
        env:
          NEXUSZ_URL:  ${{ secrets.NEXUSZ_SUPABASE_URL }}
          NEXUSZ_KEY:  ${{ secrets.NEXUSZ_SUPABASE_SERVICE_ROLE_KEY }}
          OI_BR01:     ${{ secrets.OI_TOKEN_BR01 }}
          OI_BR02:     ${{ secrets.OI_TOKEN_BR02 }}
          OI_BR03:     ${{ secrets.OI_TOKEN_BR03 }}
          OI_BR04:     ${{ secrets.OI_TOKEN_BR04 }}
          OI_BR05:     ${{ secrets.OI_TOKEN_BR05 }}
          OI_PEG01:    ${{ secrets.OI_TOKEN_PEG01 }}
          OI_PEG02:    ${{ secrets.OI_TOKEN_PEG02 }}

      # ── Criar sync_job no Supabase (via Node — sem curl) ───────────────────
      - name: Criar job de progresso
        id: criar_job
        continue-on-error: true
        run: |
          JOB_ID=$(node -e "
            const https = require('https');
            const url = new URL(process.env.NEXUSZ_URL + '/rest/v1/sync_jobs');
            const body = JSON.stringify({
              tipo: 'vendas_pneus_retroativo',
              status: 'rodando',
              progresso: 0,
              mensagem: 'Iniciando retroativo ${{ github.event.inputs.data_inicio }} -> ${{ github.event.inputs.data_fim }}...'
            });
            const opts = {
              hostname: url.hostname,
              path: url.pathname + url.search,
              method: 'POST',
              headers: {
                'apikey': process.env.NEXUSZ_KEY,
                'Authorization': 'Bearer ' + process.env.NEXUSZ_KEY,
                'Content-Type': 'application/json',
                'Prefer': 'return=representation'
              }
            };
            const req = https.request(opts, res => {
              let d = '';
              res.on('data', c => d += c);
              res.on('end', () => {
                try {
                  const arr = JSON.parse(d);
                  process.stdout.write((arr[0] || arr).id || '');
                } catch(e) { process.stdout.write(''); }
              });
            });
            req.on('error', () => process.stdout.write(''));
            req.write(body);
            req.end();
          " 2>/dev/null || echo "")
          echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT
          echo "Job ID: $JOB_ID"
        env:
          NEXUSZ_URL: ${{ secrets.NEXUSZ_SUPABASE_URL }}
          NEXUSZ_KEY: ${{ secrets.NEXUSZ_SUPABASE_SERVICE_ROLE_KEY }}

      # ── Loop de coleta ─────────────────────────────────────────────────────
      - name: Coletar dias em loop com delay
        run: |
          set +e
          JOB_ID="${{ steps.criar_job.outputs.job_id }}"
          DELAY="${{ github.event.inputs.delay_segundos }}"
          [ "${DELAY:-0}" -lt 5 ] && DELAY=5

          INICIO="${{ github.event.inputs.data_inicio }}"
          FIM="${{ github.event.inputs.data_fim }}"

          DATAS=$(node -e "
            const start = new Date('$INICIO');
            const end   = new Date('$FIM');
            const out   = [];
            for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
              out.push(d.toISOString().slice(0,10));
            }
            process.stdout.write(out.join(' '));
          ")

          TOTAL=$(echo $DATAS | wc -w | tr -d ' ')
          FEITOS=0

          echo "📅 Dias: $TOTAL | Delay: ${DELAY}s | Job: ${JOB_ID:-sem tracking}"

          atualizar_supabase() {
            local prog="$1" msg="$2" status="${3:-rodando}"
            [ -z "$JOB_ID" ] && return
            node -e "
              const https = require('https');
              const url = new URL(process.env.NEXUSZ_URL + '/rest/v1/sync_jobs?id=eq.$JOB_ID');
              const body = JSON.stringify({ progresso: $prog, mensagem: '$msg', status: '$status' });
              const opts = {
                hostname: url.hostname,
                path: url.pathname + url.search,
                method: 'PATCH',
                headers: {
                  'apikey': process.env.NEXUSZ_KEY,
                  'Authorization': 'Bearer ' + process.env.NEXUSZ_KEY,
                  'Content-Type': 'application/json'
                }
              };
              const req = https.request(opts, () => {});
              req.on('error', () => {});
              req.write(body);
              req.end();
            " 2>/dev/null || true
          }

          for DATA in $DATAS; do
            FEITOS=$((FEITOS + 1))
            PROGRESSO=$(( (FEITOS * 90) / TOTAL ))

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📍 [$FEITOS/$TOTAL] $DATA"

            atualizar_supabase "$PROGRESSO" "[$FEITOS/$TOTAL] Coletando $DATA..."

            node tools/coletar-vendas-pneus.js "$DATA"
            EXIT=$?
            [ $EXIT -ne 0 ] && echo "⚠️  $DATA saiu com código $EXIT (continuando)"

            if [ "$FEITOS" -lt "$TOTAL" ]; then
              echo "⏳ Aguardando ${DELAY}s..."
              sleep "$DELAY"
            fi
          done

          atualizar_supabase "100" "Concluído: $TOTAL dias ($INICIO → $FIM)" "concluido"
          node -e "
            const https = require('https');
            const url = new URL(process.env.NEXUSZ_URL + '/rest/v1/sync_jobs?id=eq.$JOB_ID');
            const body = JSON.stringify({ concluido_em: new Date().toISOString() });
            const opts = {
              hostname: url.hostname,
              path: url.pathname + url.search,
              method: 'PATCH',
              headers: {
                'apikey': process.env.NEXUSZ_KEY,
                'Authorization': 'Bearer ' + process.env.NEXUSZ_KEY,
                'Content-Type': 'application/json'
              }
            };
            const req = https.request(opts, () => {});
            req.on('error', () => {});
            req.write(body);
            req.end();
          " 2>/dev/null || true

          echo "🎉 Retroativo concluído: $TOTAL dias"
        env:
          NEXUSZ_URL: ${{ secrets.NEXUSZ_SUPABASE_URL }}
          NEXUSZ_KEY: ${{ secrets.NEXUSZ_SUPABASE_SERVICE_ROLE_KEY }}
