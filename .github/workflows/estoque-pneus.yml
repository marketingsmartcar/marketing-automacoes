name: Estoque de Pneus — Coleta Horária

on:
  schedule:
    # A cada hora, seg–sáb 07h–19h BRT (10h–22h UTC)
    - cron: '0 10-22 * * 1-6'
  workflow_dispatch:
    inputs:
      loja:
        description: 'Loja específica (BR01, BR02, etc.) — vazio = todas'
        required: false
        default: ''
      job_id:
        description: 'ID do sync_job no Supabase'
        required: false
        default: ''

jobs:
  coletar:
    # API OI (ProdutoXML) — token-based, sem web scraping, sem dependência de IP brasileiro
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXUSZ_SUPABASE_URL:              ${{ secrets.NEXUSZ_SUPABASE_URL }}
      NEXUSZ_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NEXUSZ_SUPABASE_SERVICE_ROLE_KEY }}
      OI_TOKEN_ALT_BR01_CENTRO:         ${{ secrets.OI_TOKEN_BR01 }}
      OI_TOKEN_ALT_BR03_AMERICANA:      ${{ secrets.OI_TOKEN_BR03 }}
      OI_TOKEN_BR04_SAO_CARLOS:         ${{ secrets.OI_TOKEN_BR04 }}
      OI_TOKEN_PEG1_ARARAQUARA:         ${{ secrets.OI_TOKEN_PEG01 }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Coletar estoque
        run: |
          LOJA="${{ github.event.inputs.loja }}"
          JOB="${{ github.event.inputs.job_id }}"
          ARGS=""
          [ -n "$LOJA" ] && ARGS="$ARGS $LOJA"
          [ -n "$JOB"  ] && ARGS="$ARGS --job-id=$JOB"
          node tools/coletar-estoque-pneus.js $ARGS

      - name: Marcar conclusão no Supabase
        if: always() && github.event.inputs.job_id != ''
        shell: bash
        env:
          NEXUSZ_SUPABASE_URL: ${{ secrets.NEXUSZ_SUPABASE_URL }}
          NEXUSZ_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NEXUSZ_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          STATUS="${{ job.status }}"
          SUPABASE_URL="${NEXUSZ_SUPABASE_URL//[$'\t\r\n ']}"
          SUPABASE_KEY="${NEXUSZ_SUPABASE_SERVICE_ROLE_KEY//[$'\t\r\n ']}"
          if [ "$STATUS" = "success" ]; then
            FINAL_STATUS="concluido"
            MSG="Coleta concluída com sucesso"
          else
            FINAL_STATUS="erro"
            MSG="Coleta falhou — verifique os logs do GitHub Actions"
          fi
          curl -s -X PATCH "$SUPABASE_URL/rest/v1/sync_jobs?id=eq.${{ github.event.inputs.job_id }}" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"$FINAL_STATUS\",\"progresso\":100,\"mensagem\":\"$MSG\",\"concluido_em\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > /dev/null
