name: Vendas Diárias — Oficina Inteligente

on:
  schedule:
    # 20:00 BRT = 23:00 UTC — Segunda a Sábado
    - cron: '0 23 * * 1-6'
  workflow_dispatch:
    inputs:
      data:
        description: 'Data específica (YYYY-MM-DD). Vazio = hoje (BRT).'
        required: false

jobs:
  coletar:
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Adicionar Git bash ao PATH
        shell: pwsh
        run: echo "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Instalar dependências
        shell: bash
        run: npm ci

      - name: Criar .env
        shell: bash
        run: |
          echo "OI_EMAIL=${{ secrets.OI_EMAIL }}"                                             >> .env
          echo "OI_SENHA=${{ secrets.OI_SENHA }}"                                             >> .env
          echo "NEXUSZ_SUPABASE_URL=${{ secrets.NEXUSZ_SUPABASE_URL }}"                       >> .env
          echo "NEXUSZ_SUPABASE_SERVICE_ROLE_KEY=${{ secrets.NEXUSZ_SUPABASE_SERVICE_ROLE_KEY }}" >> .env
          echo "NEXUSZ_SUPABASE_ANON_KEY=${{ secrets.NEXUSZ_SUPABASE_ANON_KEY }}"             >> .env
          echo "WHATSAPP_GRUPO_AUTOMACAO_ID=${{ secrets.WHATSAPP_GRUPO_AUTOMACAO_ID }}"       >> .env

      - name: Criar credenciais Google Sheets
        shell: bash
        run: |
          mkdir -p credentials
          echo '${{ secrets.GOOGLE_SHEETS_KEY_JSON }}' > credentials/google-sheets-key.json

      - name: Coleta diária (hoje BRT)
        shell: bash
        run: |
          TODAY=$(node -e "process.stdout.write(new Intl.DateTimeFormat('sv',{timeZone:'America/Sao_Paulo'}).format(new Date()))")
          echo "📅 Coletando: $TODAY"
          node tools/preencher-vendas-diarias.js "$TODAY"

      - name: Revisão semanal (apenas Sábado às 20h BRT)
        shell: bash
        run: |
          DIA_SEMANA=$(node -e "process.stdout.write(String(new Date(new Intl.DateTimeFormat('sv',{timeZone:'America/Sao_Paulo'}).format(new Date())).getDay()))")
          if [ "$DIA_SEMANA" = "6" ]; then
            echo "📅 Sábado — iniciando revisão semanal (seg–sáb)..."
            node tools/retroativo-planilha.js --semana
          else
            echo "⏭️  Dia $DIA_SEMANA — revisão semanal pulada."
          fi

      - name: Salvar log como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-${{ github.run_number }}
          path: output/relatorios/vendas-diarias.log
          if-no-files-found: ignore
          retention-days: 7
