name: ADS Monitor — Coleta em Tempo Real

on:
  schedule:
    # A cada 15 minutos, 24/7
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      job_id:
        description: 'sync_jobs ID para atualizar progresso no NexusZ'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXUSZ_SUPABASE_URL: ${{ secrets.NEXUSZ_SUPABASE_URL }}
      NEXUSZ_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NEXUSZ_SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Criar .env
        run: |
          echo "META_ACCESS_TOKEN_BR=${{ secrets.META_ACCESS_TOKEN_BR }}"                         >> .env
          echo "META_ACCESS_TOKEN_PEG=${{ secrets.META_ACCESS_TOKEN_PEG }}"                       >> .env
          echo "META_ACCOUNT_BR_MARINGA=${{ secrets.META_ACCOUNT_BR_MARINGA }}"                   >> .env
          echo "META_ACCOUNT_BR_AMERICANA=${{ secrets.META_ACCOUNT_BR_AMERICANA }}"               >> .env
          echo "META_ACCOUNT_BR_SAO_CARLOS=${{ secrets.META_ACCOUNT_BR_SAO_CARLOS }}"             >> .env
          echo "META_ACCOUNT_BR_ARARAQUARA=${{ secrets.META_ACCOUNT_BR_ARARAQUARA }}"             >> .env
          echo "META_ACCOUNT_PEG_SOROCABA=${{ secrets.META_ACCOUNT_PEG_SOROCABA }}"               >> .env
          echo "META_ACCOUNT_PEG_ARARAQUARA=${{ secrets.META_ACCOUNT_PEG_ARARAQUARA }}"           >> .env
          echo "GOOGLE_ADS_DEVELOPER_TOKEN=${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}"             >> .env
          echo "GOOGLE_ADS_CLIENT_ID=${{ secrets.GOOGLE_ADS_CLIENT_ID }}"                         >> .env
          echo "GOOGLE_ADS_CLIENT_SECRET=${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}"                 >> .env
          echo "GOOGLE_ADS_REFRESH_TOKEN=${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}"                 >> .env
          echo "GOOGLE_ADS_LOGIN_CUSTOMER_ID=${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}"         >> .env
          echo "GOOGLE_ACCOUNT_BR_AMERICANA=${{ secrets.GOOGLE_ACCOUNT_BR_AMERICANA }}"           >> .env
          echo "GOOGLE_ACCOUNT_BR_ARARAQUARA=${{ secrets.GOOGLE_ACCOUNT_BR_ARARAQUARA }}"         >> .env
          echo "GOOGLE_ACCOUNT_BR_MARINGA=${{ secrets.GOOGLE_ACCOUNT_BR_MARINGA }}"               >> .env
          echo "GOOGLE_ACCOUNT_BR_SAO_CARLOS=${{ secrets.GOOGLE_ACCOUNT_BR_SAO_CARLOS }}"         >> .env
          echo "GOOGLE_ACCOUNT_PEG_ARARAQUARA=${{ secrets.GOOGLE_ACCOUNT_PEG_ARARAQUARA }}"       >> .env
          echo "GOOGLE_ACCOUNT_PEG_SOROCABA=${{ secrets.GOOGLE_ACCOUNT_PEG_SOROCABA }}"           >> .env
          echo "NEXUSZ_SUPABASE_URL=${{ secrets.NEXUSZ_SUPABASE_URL }}"                           >> .env
          echo "NEXUSZ_SUPABASE_SERVICE_ROLE_KEY=${{ secrets.NEXUSZ_SUPABASE_SERVICE_ROLE_KEY }}" >> .env
          echo "WHATSAPP_GRUPO_AUTOMACAO_ID=${{ secrets.WHATSAPP_GRUPO_AUTOMACAO_ID }}"           >> .env

      - name: Registrar início (silencioso)
        shell: bash
        run: node tools/notificar-automacao.js --nome "Monitor ADS" --status inicio --silencioso

      - name: Coletar dados ADS → Supabase
        run: node tools/coletar-ads-supabase.js

      - name: Registrar conclusão (silencioso)
        if: success()
        run: node tools/notificar-automacao.js --nome "Monitor ADS" --status fim --silencioso

      - name: Notificar erro
        if: failure()
        run: node tools/notificar-automacao.js --nome "Monitor ADS" --status erro

      - name: Marcar conclusão no Supabase
        if: always() && github.event.inputs.job_id != ''
        env:
          NEXUSZ_SUPABASE_URL: ${{ secrets.NEXUSZ_SUPABASE_URL }}
          NEXUSZ_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NEXUSZ_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          STATUS="${{ job.status }}"
          SUPABASE_URL="${NEXUSZ_SUPABASE_URL//[$'\t\r\n ']}"
          SUPABASE_KEY="${NEXUSZ_SUPABASE_SERVICE_ROLE_KEY//[$'\t\r\n ']}"
          if [ "$STATUS" = "success" ]; then
            FINAL_STATUS="concluido"
            MSG="Coleta concluída com sucesso"
          else
            FINAL_STATUS="erro"
            MSG="Coleta falhou — verifique os logs do GitHub Actions"
          fi
          curl -s -X PATCH "$SUPABASE_URL/rest/v1/sync_jobs?id=eq.${{ github.event.inputs.job_id }}" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"$FINAL_STATUS\",\"progresso\":100,\"mensagem\":\"$MSG\",\"concluido_em\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > /dev/null
