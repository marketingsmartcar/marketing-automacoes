name: Relatório de Leads — Deskrio → Google Sheets

on:
  schedule:
    # Toda hora de seg-sáb das 07:00 às 18:00 BRT (10:00–21:00 UTC)
    - cron: '0 10-21 * * 1-6'
  workflow_dispatch:
    inputs:
      mes:
        description: 'Mês (1-12). Vazio = mês atual.'
        required: false
      ano:
        description: 'Ano (ex: 2026). Vazio = ano atual.'
        required: false

permissions:
  contents: read

jobs:
  relatorio:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Adicionar Git bash ao PATH
        shell: powershell
        run: echo "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Instalar dependências
        shell: bash
        run: npm ci

      - name: Criar .env
        shell: bash
        run: |
          echo "DESKRIO_API_TOKEN_BR=${{ secrets.DESKRIO_API_TOKEN_BR }}"           >> .env
          echo "DESKRIO_API_TOKEN_PEG=${{ secrets.DESKRIO_API_TOKEN_PEG }}"         >> .env
          echo "DESKRIO_INSTANCE_BR=${{ secrets.DESKRIO_INSTANCE_BR }}"             >> .env
          echo "DESKRIO_INSTANCE_PEG=${{ secrets.DESKRIO_INSTANCE_PEG }}"           >> .env
          echo "GOOGLE_SHEETS_SPREADSHEET_ID=${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID_LEADS }}" >> .env
          echo "GOOGLE_SERVICE_ACCOUNT_KEY=credentials/google-sheets-key.json"     >> .env
          echo "WHATSAPP_GRUPO_AUTOMACAO_ID=${{ secrets.WHATSAPP_GRUPO_AUTOMACAO_ID }}" >> .env

      - name: Criar credenciais Google Sheets
        shell: bash
        run: |
          mkdir -p credentials
          echo '${{ secrets.GOOGLE_SHEETS_KEY_JSON }}' > credentials/google-sheets-key.json

      - name: Notificar início (silencioso)
        shell: bash
        run: node tools/notificar-automacao.js --nome "Leads Planilha" --status inicio --silencioso

      - name: Executar relatório
        shell: bash
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.mes }}" ]; then
            ARGS="${{ github.event.inputs.mes }}"
            if [ -n "${{ github.event.inputs.ano }}" ]; then
              ARGS="$ARGS ${{ github.event.inputs.ano }}"
            fi
          fi
          node tools/relatorio-mensal-sheets.js $ARGS

      - name: Notificar conclusão (silencioso)
        if: success()
        shell: bash
        run: node tools/notificar-automacao.js --nome "Leads Planilha" --status fim --silencioso

      - name: Notificar erro
        if: failure()
        shell: bash
        run: node tools/notificar-automacao.js --nome "Leads Planilha" --status erro

      - name: Salvar log como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-leads-${{ github.run_number }}
          path: logs/relatorio-leads.log
          if-no-files-found: ignore
          retention-days: 7
