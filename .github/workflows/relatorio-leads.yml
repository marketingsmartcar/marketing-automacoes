name: Relatório de Leads — Deskrio → Google Sheets

on:
  schedule:
    # 18:00 BRT = 21:00 UTC — todos os dias
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      mes:
        description: 'Mês (1-12). Vazio = mês atual.'
        required: false
      ano:
        description: 'Ano (ex: 2026). Vazio = ano atual.'
        required: false

jobs:
  relatorio:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Criar .env
        run: |
          echo "DESKRIO_API_TOKEN_BR=${{ secrets.DESKRIO_API_TOKEN_BR }}"           >> .env
          echo "DESKRIO_API_TOKEN_PEG=${{ secrets.DESKRIO_API_TOKEN_PEG }}"         >> .env
          echo "DESKRIO_INSTANCE_BR=${{ secrets.DESKRIO_INSTANCE_BR }}"             >> .env
          echo "DESKRIO_INSTANCE_PEG=${{ secrets.DESKRIO_INSTANCE_PEG }}"           >> .env
          echo "GOOGLE_SHEETS_SPREADSHEET_ID=${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID_LEADS }}" >> .env
          echo "GOOGLE_SERVICE_ACCOUNT_KEY=credentials/google-sheets-key.json"     >> .env

      - name: Criar credenciais Google Sheets
        run: |
          mkdir -p credentials
          echo '${{ secrets.GOOGLE_SHEETS_KEY_JSON }}' > credentials/google-sheets-key.json

      - name: Executar relatório
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.mes }}" ]; then
            ARGS="${{ github.event.inputs.mes }}"
            if [ -n "${{ github.event.inputs.ano }}" ]; then
              ARGS="$ARGS ${{ github.event.inputs.ano }}"
            fi
          fi
          node tools/relatorio-mensal-sheets.js $ARGS

      - name: Salvar log como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-leads-${{ github.run_number }}
          path: logs/relatorio-leads.log
          if-no-files-found: ignore
          retention-days: 7
