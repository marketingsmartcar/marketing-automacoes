name: Social Media — Coleta Horária

on:
  schedule:
    # Toda hora de seg-sáb das 08:00 às 19:00 BRT (11:00–22:00 UTC)
    - cron: '0 11-22 * * 1-6'
  workflow_dispatch:
    inputs:
      job_id:
        description: 'sync_jobs ID para atualizar progresso no NexusZ'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXUSZ_SUPABASE_URL: ${{ secrets.NEXUSZ_SUPABASE_URL }}
      NEXUSZ_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NEXUSZ_SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Criar .env
        run: |
          echo "META_ACCESS_TOKEN_BR=${{ secrets.META_ACCESS_TOKEN_BR }}"           >> .env
          echo "META_ACCESS_TOKEN_PEG=${{ secrets.META_ACCESS_TOKEN_PEG }}"         >> .env
          echo "META_IG_ID_BR=${{ secrets.META_IG_ID_BR }}"                         >> .env
          echo "META_IG_ID_PEG_ARQ=${{ secrets.META_IG_ID_PEG_ARQ }}"               >> .env
          echo "META_IG_ID_PEG_SOR=${{ secrets.META_IG_ID_PEG_SOR }}"               >> .env
          echo "META_PAGE_ID_BR=${{ secrets.META_PAGE_ID_BR }}"                     >> .env
          echo "META_PAGE_TOKEN_BR=${{ secrets.META_PAGE_TOKEN_BR }}"               >> .env
          echo "META_PAGE_ID_PEG_ARQ=${{ secrets.META_PAGE_ID_PEG_ARQ }}"           >> .env
          echo "META_PAGE_TOKEN_PEG_ARQ=${{ secrets.META_PAGE_TOKEN_PEG_ARQ }}"     >> .env
          echo "META_PAGE_ID_PEG_SOR=${{ secrets.META_PAGE_ID_PEG_SOR }}"           >> .env
          echo "META_PAGE_TOKEN_PEG_SOR=${{ secrets.META_PAGE_TOKEN_PEG_SOR }}"     >> .env
          echo "NEXUSZ_SUPABASE_URL=${{ secrets.NEXUSZ_SUPABASE_URL }}"             >> .env
          echo "NEXUSZ_SUPABASE_SERVICE_ROLE_KEY=${{ secrets.NEXUSZ_SUPABASE_SERVICE_ROLE_KEY }}" >> .env
          echo "WHATSAPP_GRUPO_AUTOMACAO_ID=${{ secrets.WHATSAPP_GRUPO_AUTOMACAO_ID }}" >> .env
          echo "YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}"                   >> .env

      - name: Registrar início (silencioso)
        run: node tools/notificar-automacao.js --nome "Social Media" --status inicio --silencioso

      - name: Coletar dados Social Media (IG + FB)
        run: node tools/coletar-social-media.js

      - name: Coletar YouTube
        run: node tools/coletar-youtube.js
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Registrar conclusão (silencioso)
        if: success()
        run: node tools/notificar-automacao.js --nome "Social Media" --status fim --silencioso

      - name: Notificar erro
        if: failure()
        run: node tools/notificar-automacao.js --nome "Monitor ADS" --status erro

      - name: Marcar conclusão no Supabase
        if: always() && github.event.inputs.job_id != ''
        env:
          NEXUSZ_SUPABASE_URL: ${{ secrets.NEXUSZ_SUPABASE_URL }}
          NEXUSZ_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NEXUSZ_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            FINAL_STATUS="concluido"
            MSG="Coleta concluída com sucesso"
          else
            FINAL_STATUS="erro"
            MSG="Coleta falhou — verifique os logs do GitHub Actions"
          fi
          curl -s -X PATCH "$NEXUSZ_SUPABASE_URL/rest/v1/sync_jobs?id=eq.${{ github.event.inputs.job_id }}" \
            -H "apikey: $NEXUSZ_SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $NEXUSZ_SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"$FINAL_STATUS\",\"progresso\":100,\"mensagem\":\"$MSG\",\"concluido_em\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > /dev/null
