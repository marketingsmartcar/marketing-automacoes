name: Coletar Leads Agora

on:
  workflow_dispatch:       # acionado via botão no NexusZ
    inputs:
      job_id:
        description: 'sync_jobs ID para atualizar progresso no NexusZ'
        required: false
        default: ''
  schedule:
    - cron: '0 10,18 * * *'  # automático: 07h e 15h (BRT = UTC-3)

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXUSZ_SUPABASE_URL: ${{ secrets.NEXUSZ_SUPABASE_URL }}
      NEXUSZ_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NEXUSZ_SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Criar .env
        run: |
          echo "DESKRIO_API_TOKEN_BR=${{ secrets.DESKRIO_API_TOKEN_BR }}"                         >> .env
          echo "DESKRIO_API_TOKEN_PEG=${{ secrets.DESKRIO_API_TOKEN_PEG }}"                       >> .env
          echo "DESKRIO_INSTANCE_BR=${{ secrets.DESKRIO_INSTANCE_BR }}"                           >> .env
          echo "DESKRIO_INSTANCE_PEG=${{ secrets.DESKRIO_INSTANCE_PEG }}"                         >> .env
          echo "NEXUSZ_SUPABASE_URL=${{ secrets.NEXUSZ_SUPABASE_URL }}"                           >> .env
          echo "NEXUSZ_SUPABASE_SERVICE_ROLE_KEY=${{ secrets.NEXUSZ_SUPABASE_SERVICE_ROLE_KEY }}" >> .env
          echo "OI_TOKEN_BR01=${{ secrets.OI_TOKEN_BR01 }}"                                       >> .env
          echo "OI_TOKEN_BR02=${{ secrets.OI_TOKEN_BR02 }}"                                       >> .env
          echo "OI_TOKEN_BR03=${{ secrets.OI_TOKEN_BR03 }}"                                       >> .env
          echo "OI_TOKEN_BR04=${{ secrets.OI_TOKEN_BR04 }}"                                       >> .env
          echo "OI_TOKEN_BR05=${{ secrets.OI_TOKEN_BR05 }}"                                       >> .env
          echo "OI_TOKEN_PEG01=${{ secrets.OI_TOKEN_PEG01 }}"                                    >> .env
          echo "OI_TOKEN_PEG02=${{ secrets.OI_TOKEN_PEG02 }}"                                    >> .env
          echo "GOOGLE_SHEETS_SPREADSHEET_ID=${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}"        >> .env
          echo "GOOGLE_SERVICE_ACCOUNT_KEY=credentials/google-sheets-key.json"                    >> .env

      - name: Criar credencial Google
        run: |
          mkdir -p credentials
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > credentials/google-sheets-key.json

      - name: Coletar leads de hoje
        run: node tools/leads-hoje.js --agora

      - name: Marcar conclusão no Supabase
        if: always() && github.event.inputs.job_id != ''
        env:
          NEXUSZ_SUPABASE_URL: ${{ secrets.NEXUSZ_SUPABASE_URL }}
          NEXUSZ_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NEXUSZ_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            FINAL_STATUS="concluido"
            MSG="Coleta concluída com sucesso"
          else
            FINAL_STATUS="erro"
            MSG="Coleta falhou — verifique os logs do GitHub Actions"
          fi
          curl -s -X PATCH "$NEXUSZ_SUPABASE_URL/rest/v1/sync_jobs?id=eq.${{ github.event.inputs.job_id }}" \
            -H "apikey: $NEXUSZ_SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $NEXUSZ_SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"$FINAL_STATUS\",\"progresso\":100,\"mensagem\":\"$MSG\",\"concluido_em\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > /dev/null
