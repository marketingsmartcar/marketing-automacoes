name: Retroativo — Avaliações Google

on:
  workflow_dispatch:
    inputs:
      loja:
        description: 'Loja específica (ex: BR_ARQ1). Deixe em branco para todas.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  retroativo:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6h máximo — suficiente para todas as lojas

    env:
      NEXUSZ_SUPABASE_URL: ${{ secrets.NEXUSZ_SUPABASE_URL }}
      NEXUSZ_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NEXUSZ_SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências do sistema (Puppeteer/Chrome)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2t64

      - name: Instalar dependências
        run: npm ci

      - name: Criar .env
        run: |
          echo "NEXUSZ_SUPABASE_URL=${{ secrets.NEXUSZ_SUPABASE_URL }}"                            >> .env
          echo "NEXUSZ_SUPABASE_SERVICE_ROLE_KEY=${{ secrets.NEXUSZ_SUPABASE_SERVICE_ROLE_KEY }}"   >> .env
          echo "GOOGLE_PLACE_ID_BR_ARARAQUARA1=${{ secrets.GOOGLE_PLACE_ID_BR_ARARAQUARA1 }}"       >> .env
          echo "GOOGLE_PLACE_ID_BR_ARARAQUARA2=${{ secrets.GOOGLE_PLACE_ID_BR_ARARAQUARA2 }}"       >> .env
          echo "GOOGLE_PLACE_ID_BR_SAO_CARLOS=${{ secrets.GOOGLE_PLACE_ID_BR_SAO_CARLOS }}"         >> .env
          echo "GOOGLE_PLACE_ID_BR_AMERICANA=${{ secrets.GOOGLE_PLACE_ID_BR_AMERICANA }}"           >> .env
          echo "GOOGLE_PLACE_ID_BR_MARINGA=${{ secrets.GOOGLE_PLACE_ID_BR_MARINGA }}"               >> .env
          echo "GOOGLE_PLACE_ID_PEG_SOROCABA=${{ secrets.GOOGLE_PLACE_ID_PEG_SOROCABA }}"           >> .env
          echo "GOOGLE_PLACE_ID_PEG_ARARAQUARA=${{ secrets.GOOGLE_PLACE_ID_PEG_ARARAQUARA }}"       >> .env

      - name: Rodar retroativo
        run: |
          if [ -n "${{ github.event.inputs.loja }}" ]; then
            node tools/retroativo-avaliacoes.js --loja=${{ github.event.inputs.loja }}
          else
            node tools/retroativo-avaliacoes.js
          fi
