name: Avaliações Google — NexusZ Supabase

on:
  schedule:
    # Toda tarde às 17h BRT (20:00 UTC) seg-sáb
    - cron: '0 20 * * 1-6'
  workflow_dispatch:
    inputs:
      job_id:
        description: 'sync_jobs ID para atualizar progresso no NexusZ'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXUSZ_SUPABASE_URL: ${{ secrets.NEXUSZ_SUPABASE_URL }}
      NEXUSZ_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NEXUSZ_SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências do sistema (Puppeteer)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2t64

      - name: Instalar dependências
        run: npm ci

      - name: Criar .env
        run: |
          echo "NEXUSZ_SUPABASE_URL=${{ secrets.NEXUSZ_SUPABASE_URL }}"                          >> .env
          echo "NEXUSZ_SUPABASE_SERVICE_ROLE_KEY=${{ secrets.NEXUSZ_SUPABASE_SERVICE_ROLE_KEY }}" >> .env
          echo "GOOGLE_PLACE_ID_BR_ARARAQUARA1=${{ secrets.GOOGLE_PLACE_ID_BR_ARARAQUARA1 }}"     >> .env
          echo "GOOGLE_PLACE_ID_BR_ARARAQUARA2=${{ secrets.GOOGLE_PLACE_ID_BR_ARARAQUARA2 }}"     >> .env
          echo "GOOGLE_PLACE_ID_BR_SAO_CARLOS=${{ secrets.GOOGLE_PLACE_ID_BR_SAO_CARLOS }}"       >> .env
          echo "GOOGLE_PLACE_ID_BR_AMERICANA=${{ secrets.GOOGLE_PLACE_ID_BR_AMERICANA }}"         >> .env
          echo "GOOGLE_PLACE_ID_BR_MARINGA=${{ secrets.GOOGLE_PLACE_ID_BR_MARINGA }}"             >> .env
          echo "GOOGLE_PLACE_ID_PEG_SOROCABA=${{ secrets.GOOGLE_PLACE_ID_PEG_SOROCABA }}"         >> .env
          echo "GOOGLE_PLACE_ID_PEG_ARARAQUARA=${{ secrets.GOOGLE_PLACE_ID_PEG_ARARAQUARA }}"     >> .env

      - name: Coletar avaliações Google
        run: node tools/coletar-avaliacoes.js

      - name: Marcar conclusão no Supabase
        if: always() && github.event.inputs.job_id != ''
        env:
          NEXUSZ_SUPABASE_URL: ${{ secrets.NEXUSZ_SUPABASE_URL }}
          NEXUSZ_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NEXUSZ_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            FINAL_STATUS="concluido"
            MSG="Coleta concluida com sucesso"
          else
            FINAL_STATUS="erro"
            MSG="Coleta falhou — verifique os logs do GitHub Actions"
          fi
          SUPABASE_URL="${{ secrets.NEXUSZ_SUPABASE_URL }}"
          SUPABASE_KEY="${{ secrets.NEXUSZ_SUPABASE_SERVICE_ROLE_KEY }}"
          JOB_ID="${{ github.event.inputs.job_id }}"
          curl -s -X PATCH "${SUPABASE_URL}/rest/v1/sync_jobs?id=eq.${JOB_ID}" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"${FINAL_STATUS}\",\"progresso\":100,\"mensagem\":\"${MSG}\",\"concluido_em\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
            -o /dev/null -w "%{http_code}" || echo "curl falhou (ignorado)"
