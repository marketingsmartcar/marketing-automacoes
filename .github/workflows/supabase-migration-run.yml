name: Supabase — Rodar Migration SQL (manual)

on:
  workflow_dispatch:
    inputs:
      sql_file:
        description: 'Arquivo SQL em supabase/migrations/ para executar'
        required: true
        default: 'create_clientes_oi.sql'

permissions:
  contents: read

jobs:
  migration:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rodar migration via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ubiuershczqjnoczcupa
        run: |
          SQL=$(cat "supabase/migrations/${{ github.event.inputs.sql_file }}")
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(echo "$SQL" | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>process.stdout.write(JSON.stringify(s)))")}" )

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP $HTTP_CODE"
          echo "$BODY"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Migration executada com sucesso"
          else
            echo "❌ Falha na migration (HTTP $HTTP_CODE)"
            exit 1
          fi
